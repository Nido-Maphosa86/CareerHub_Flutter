name: careerhub
description: "CareerHub — Flutter mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8

  # State management and navigation, from Assignments 1.3 and 1.4.
  flutter_riverpod: 3.0.3
  go_router: ^17.3.0

  # HTTP client used by the data layer to call the CareerHub API.
  dio: ^5.7.0

  # Annotations (@riverpod) read by the code generator. Runtime dependency
  # because the generated code references it.
  riverpod_annotation: ^3.0.0

  # Assignment 2.2 additions. freezed_annotation carries the @freezed and
  # @Default markers the models are decorated with; json_annotation carries
  # @JsonKey and friends. Both are runtime dependencies because the generated
  # code references types from them.
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package contains a set of recommended lints.
  flutter_lints: ^6.0.0

  # Code-generation tooling. These run at build time only and are never bundled
  # into the compiled app: build_runner drives generation, riverpod_generator
  # writes the .g.dart provider boilerplate from the @riverpod annotations,
  # freezed writes the .freezed.dart files (==, hashCode, copyWith, toString)
  # from @freezed annotations, and json_serializable writes the fromJson/toJson
  # inside .g.dart for any Freezed class that also declares a fromJson factory.
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
