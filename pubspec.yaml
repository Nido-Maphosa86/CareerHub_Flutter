name: careerhub
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
version: 1.0.0+1

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8

  # State management and navigation, from Assignments 1.3 and 1.4.
  flutter_riverpod: ^3.0.3
  go_router: ^17.3.0

  # HTTP client used by the data layer to call the CareerHub API.
  dio: ^5.7.0

  # Annotations (@riverpod) read by the code generator. Runtime dependency
  # because the generated code references it.
  riverpod_annotation: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package contains a set of recommended lints.
  flutter_lints: ^6.0.0

  # Code-generation tooling. These run at build time only and are never bundled
  # into the compiled app: build_runner drives generation, riverpod_generator
  # writes the .g.dart provider boilerplate from the @riverpod annotations.
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is included with your
  # application, so that you can use the icons in the material Icons class.
  uses-material-design: true
